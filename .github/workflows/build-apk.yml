name: Gerar APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Gerar debug.keystore (o projeto espera um na raiz)
        run: |
          keytool -genkeypair \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Criar .env com a chave do Gemini (do segredo)
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Dar permissão ao gradlew
        run: chmod +x ./gradlew

      - name: Compilar APK de debug
        run: ./gradlew assembleDebug --no-daemon --no-configuration-cache

      - name: Publicar o APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: clonecut-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
